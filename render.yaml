services:
  - type: web
    name: stockai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stockai-db
          property: connectionString

databases:
  - name: stockai-db
    databaseName: stockai
    user: stockai
